<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TJ APPS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="main-header">
    <div class="header-inner">
        <div class="logo">TJ<span>APPS</span></div>
        <div class="admin-lock-btn" onclick="loginAdmin()">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
        </div>
    </div>
</header>

    <main id="home-view" class="view active">
        <div class="view-title">Барномаҳо</div>
        <div id="app-grid" class="app-grid">
            </div>
    </main>

    <main id="games-view" class="view">
        <div class="view-title">Бозиҳо</div>
        <div id="games-grid" class="app-grid"></div>
    </main>

    <main id="search-view" class="view">
        <div class="search-header">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Ҷустуҷӯи барнома..." oninput="searchApps()">
            </div>
        </div>
        <div id="search-results" class="app-grid"></div>
    </main>

    <div id="appModal" class="full-modal">
        <div id="modal-data" class="modal-content">
            </div>
    </div>

    <div id="adminPanel" class="full-modal">
        <div class="modal-content">
            <button class="btn-close-modal" onclick="closeModal('adminPanel')">←</button>
            <h2 style="margin-bottom: 20px;">Иловаи Барнома</h2>

            <div class="admin-card">
                <div class="upload-section">
                    <div class="upload-item">
                        <label for="mainIcon" class="btn-upload">🖼 Интихоби Иконка</label>
                        <input type="file" id="mainIcon" accept="image/*" hidden onchange="previewFile(this, 'pIcon', 'icon')">
                        <img id="pIcon" src="https://via.placeholder.com/80" class="p-img">
                    </div>
                    
                    <div class="upload-item">
                        <label for="screenshots" class="btn-upload">📸 Интихоби Скриншотҳо</label>
                        <input type="file" id="screenshots" accept="image/*" multiple hidden onchange="previewScreenshots(this)">
                        <div id="preview-container" class="admin-screenshots-preview">
                            </div>
                    </div>
                </div>


                <div class="admin-form">
                    <input type="text" id="aName" placeholder="Номи барнома">
                    
                    <select id="aType">
                        <option value="app">Барнома</option>
                        <option value="game">Бозӣ</option>
                    </select>

                    <input type="text" id="aCat" placeholder="Категория (м-н: Алоқа, Бозиҳо)">
                    <input type="text" id="aVideo" placeholder="Линки видео (Google Drive)">

                    <textarea id="aDesc" placeholder="Дар бораи барнома..." rows="4"></textarea>
                    <input type="text" id="aLink" placeholder="Линки скачиваний (Google Drive/Telegram)">
                    
                    <button class="btn-main" onclick="publishApp()">Илова кардан</button>
                </div>

                <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">
                <h3>Рӯйхати барномаҳо:</h3>
                <div id="adminAppList" class="admin-list"></div>
            </div>
        </div>
    </div>

<nav class="bottom-nav">
    <div class="nav-tab active" onclick="switchTab('home', this)">
        <div class="nav-pill">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/>
            </svg>
        </div>
        <p>Барномаҳо</p>
    </div>
    <div class="nav-tab" onclick="switchTab('games', this)">
        <div class="nav-pill">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
            </svg>
        </div>
        <p>Бозиҳо</p>
    </div>
    <div class="nav-tab" onclick="switchTab('search', this)">
        <div class="nav-pill">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
        </div>
        <p>Ҷустуҷӯ</p>
    </div>
</nav>
    <script src="db.js"></script>
    <script src="script.js"></script>
    <script src="script.js"></script>
</body>
</html>
